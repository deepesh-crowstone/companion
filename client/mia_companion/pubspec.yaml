name: mia_companion
description: Mia AI companion — chat, voice notes, and realtime calls.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.3.3
  record: ^6.2.0
  permission_handler: ^11.3.1
  just_audio: ^0.9.42
  web_socket_channel: ^3.0.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  flutter_pcm_sound: ^3.1.1
  audio_session: ^0.1.25
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/mia_profile.png
